<div id="waiting-root" style="width: 100%; height: 100%; position: relative; overflow: hidden;">
    <img src="views/assets/bg_N_center.png" style="width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;">
    <div id="waiting-controls" style="position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; z-index: 10;">
        <button class="waiting-btn" data-direction="left">◀ Влево</button>
        <button class="waiting-btn" data-direction="turn">🔄 Обернуться</button>
        <button class="waiting-btn" data-direction="right">Вправо ▶</button>
    </div>
</div>
<style>
    .waiting-btn {
        background: #2a2a2a;
        border: none;
        color: white;
        padding: 12px 24px;
        margin: 0 10px;
        font-family: monospace;
        font-size: 1.1rem;
        cursor: pointer;
        border-radius: 30px;
    }
    .waiting-btn:hover {
        background: #4a4a4a;
    }
</style>
<script>
    (function() {
        const btns = document.querySelectorAll('.waiting-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const dir = btn.getAttribute('data-direction');
                if (dir === 'left') alert('🚧 Перемещение влево в разработке. Нужно нарисовать фон.');
                else if (dir === 'right') alert('🚧 Перемещение вправо в разработке. Нужно нарисовать фон.');
                else if (dir === 'turn') alert('🚧 Поворот на юг в разработке. Нужно нарисовать фон.');
            });
        });
        const img = document.querySelector('#waiting-root img');
        img.onerror = () => {
            const root = document.getElementById('waiting-root');
            root.innerHTML = `<div style="color:red; text-align:center; padding:20px;">❌ Файл не найден: views/assets/bg_N_center.png<br>Проверьте путь.</div>`;
        };
    })();
</script>
